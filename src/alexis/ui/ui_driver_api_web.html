<!DOCTYPE html>
<html lang="en" class="h-full antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Terminal Client</title>
    <!--
      Server URL injection point.
      When this file is served by the agent's API server, the placeholder below
      is replaced with the real "http://host:port" the server is bound to, so the
      client knows where to connect without any manual configuration.
      When the file is opened directly (file://), the placeholder is left intact
      and the client falls back to the page origin / the default value.
    -->
    <script>
        window.__AI_SERVER_URL__ = "__SERVER_URL__";
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use a good monospace font -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background-color: #050505; /* Deep black */
            color: #22c55e; /* Tailwind green-500 */
        }

        /* Blocky terminal scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
            border-left: 1px solid #14532d;
        }
        ::-webkit-scrollbar-thumb {
            background: #166534;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #22c55e;
        }
        
        .message-content p { margin-bottom: 0.5rem; }
        .message-content p:last-child { margin-bottom: 0; }
        
        .message-content pre {
            background-color: #0a0a0a;
            color: #d1d5db; /* gray-300 */
            padding: 0.75rem;
            border: 1px solid #14532d; /* green-900 */
            border-left: 4px solid #22c55e;
            overflow-x: auto;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .message-content code {
            background-color: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 0.125rem 0.25rem;
        }
        .message-content pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
        }

        .blinking-cursor::after {
            content: '█';
            display: inline-block;
            animation: blink 1s step-end infinite;
            margin-left: 4px;
            color: #22c55e;
            vertical-align: text-bottom;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Image preview styling */
        .image-preview-wrapper {
            position: relative;
            display: inline-block;
        }
        .remove-image-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #050505;
            color: #ef4444;
            border: 1px solid #ef4444;
            cursor: pointer;
            font-size: 10px;
            padding: 0 4px;
        }
        .remove-image-btn:hover {
            background-color: #ef4444;
            color: #050505;
        }

        /* Remove default detail marker */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }

        /* Terminal-style segmented "LED" processing loader.
           Idle: all segments unlit (dark). Active: a single cyan segment
           steps across the row, one cell at a time, like a digital display. */
        .proc-loader {
            display: flex;
            gap: 2px;
            width: 64px;
            height: 12px;
            padding: 2px;
            flex: none;
            background-color: #0a0a0a;
            border: 1px solid #374151; /* gray-700 frame */
        }
        .proc-loader .proc-seg {
            flex: 1 1 0;
            background-color: #1f2937; /* gray-800 (unlit) */
        }
        .proc-loader.active {
            border-color: #0891b2; /* cyan-600 */
        }
        /* A single lit cell, stepped left<->right by JS for a digital scanner. */
        .proc-loader .proc-seg.lit {
            background-color: #22d3ee; /* cyan-400 */
            box-shadow: 0 0 6px #22d3ee;
        }
    </style>
</head>
<body class="h-full flex flex-col selection:bg-green-900 selection:text-white text-sm sm:text-base">

    <header class="border-b border-green-900 p-3 flex flex-row justify-between items-center bg-black z-10 gap-3">
        <div id="app-title" class="text-green-500 font-bold">AI-Agent.Alexis</div>

        <div class="flex items-center gap-3 text-xs sm:text-sm">
            <div id="proc-loader" class="proc-loader" title="Idle"></div>
            <span id="status-indicator" class="font-bold text-red-500 transition-colors">OFFLINE</span>
            <button id="clear-btn" class="text-red-500 hover:bg-red-900 hover:text-white px-2 py-1 border border-transparent transition-colors">
                [CLEAR_LOG]
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col relative w-full mx-auto">
        
        <!-- Terminal Error/Notification Toast -->
        <div id="toast" class="absolute top-4 left-1/2 transform -translate-x-1/2 border px-4 py-2 hidden z-50 transition-opacity duration-300 opacity-0 bg-black shadow-lg shadow-black" role="alert">
            <span id="toast-prefix" class="font-bold mr-2"></span>
            <span id="toast-message" class="text-gray-300"></span>
        </div>

        <!-- Chat Output Logs -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 scroll-smooth break-words">
            <!-- Greeting injected by JS -->
        </div>

        <div class="border-t border-green-900 bg-black p-4 relative shrink-0">
            
            <div id="image-preview-container" class="flex flex-wrap gap-4 mb-4 hidden border border-dashed border-green-900 p-2">
                <!-- Previews injected here -->
            </div>

            <div id="file-preview-container" class="flex flex-wrap gap-2 mb-4 hidden border border-dashed border-cyan-900 p-2">
                <!-- Text file chips injected here -->
            </div>

            <form id="chat-form" class="flex items-start gap-2">

                <input type="file" id="file-upload" accept="image/*" multiple class="hidden">
                <input type="file" id="text-file-upload" multiple class="hidden">

                <div class="flex-1 relative">
                    <textarea id="message-input" rows="1" class="w-full bg-transparent text-gray-200 outline-none resize-none overflow-hidden placeholder-green-900 leading-normal" placeholder="enter command or prompt..." style="min-height: 24px; max-height: 200px;"></textarea>
                </div>

                <div class="flex shrink-0 gap-2 text-xs sm:text-sm mt-1">
                    <button type="button" id="upload-btn" class="text-yellow-500 hover:bg-yellow-900 hover:text-white px-2 border border-transparent transition-colors" title="Attach Images">
                        [IMG]
                    </button>
                    <button type="button" id="file-btn" class="text-cyan-500 hover:bg-cyan-900 hover:text-white px-2 border border-transparent transition-colors" title="Attach Files">
                        [FILE]
                    </button>
                    <button type="submit" id="send-btn" class="text-green-500 hover:bg-green-900 hover:text-white px-2 border border-transparent transition-colors" title="Execute">
                        [SEND]
                    </button>
                    <button type="button" id="stop-btn" class="text-red-500 hover:bg-red-900 hover:text-white px-2 border border-red-900 transition-colors hidden" title="Interrupt">
                        [CTRL+C]
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatContainer = document.getElementById('chat-container');
            const chatForm = document.getElementById('chat-form');
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const stopBtn = document.getElementById('stop-btn');
            const fileUpload = document.getElementById('file-upload');
            const uploadBtn = document.getElementById('upload-btn');
            const imagePreviewContainer = document.getElementById('image-preview-container');
            const textFileUpload = document.getElementById('text-file-upload');
            const fileBtn = document.getElementById('file-btn');
            const filePreviewContainer = document.getElementById('file-preview-container');
            const clearBtn = document.getElementById('clear-btn');
            const appTitle = document.getElementById('app-title');
            const procLoader = document.getElementById('proc-loader');
            const statusIndicator = document.getElementById('status-indicator');
            const toast = document.getElementById('toast');
            const toastPrefix = document.getElementById('toast-prefix');
            const toastMessage = document.getElementById('toast-message');

            let selectedImages = [];
            let selectedFiles = [];
            let isGenerating = false;
            let currentAbortController = null;
            // Whether the connected model can accept images (vision). Updated
            // from GET /capabilities; null/true => allowed, false => disabled.
            let imageSupported = true;
            
            const resizeTextarea = () => {
                messageInput.style.height = 'auto';
                messageInput.style.height = (messageInput.scrollHeight) + 'px';
            };
            messageInput.addEventListener('input', resizeTextarea);

            // Resolve the server URL once:
            //   1. The URL injected by the agent when it serves this file.
            //   2. Otherwise, the page origin when served over http(s).
            //   3. Otherwise (opened as a local file://), a sensible default.
            const resolveBaseUrl = () => {
                const injected = window.__AI_SERVER_URL__;
                let url;
                if (injected && !injected.includes('__SERVER_URL__')) {
                    url = injected;
                } else if (location.protocol === 'http:' || location.protocol === 'https:') {
                    url = location.origin;
                } else {
                    url = 'http://127.0.0.1:48010';
                }
                return url.endsWith('/') ? url.slice(0, -1) : url;
            };

            const BASE_URL = resolveBaseUrl();
            const getBaseUrl = () => BASE_URL;

            const showToast = (message, isError = true) => {
                toastMessage.textContent = message;
                toastPrefix.textContent = isError ? '[ERROR]' : '[OK]';
                
                toast.className = `absolute top-4 left-1/2 transform -translate-x-1/2 border px-4 py-2 z-50 transition-opacity duration-300 opacity-100 bg-black shadow-lg shadow-black ${isError ? 'border-red-500 text-red-500' : 'border-green-500 text-green-500'}`;
                toast.classList.remove('hidden');
                
                setTimeout(() => {
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0');
                    setTimeout(() => toast.classList.add('hidden'), 300);
                }, 4000);
            };

            const scrollToBottom = () => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };

            // Connection state is shown by the header indicator, not a chat
            // message. ONLINE = yellow, OFFLINE = red.
            const setOnline = (online) => {
                if (!statusIndicator) return;
                statusIndicator.textContent = online ? 'ONLINE' : 'OFFLINE';
                statusIndicator.classList.toggle('text-yellow-400', online);
                statusIndicator.classList.toggle('text-red-500', !online);
            };

            // Small clipboard/copy icon used next to each message label.
            const CLIPBOARD_ICON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" class="inline-block w-3.5 h-3.5 align-text-bottom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

            // Copy text to the clipboard, falling back to execCommand for
            // non-secure contexts where navigator.clipboard is unavailable.
            const copyToClipboard = async (text) => {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (e) {
                    try {
                        const ta = document.createElement('textarea');
                        ta.value = text;
                        ta.style.position = 'fixed';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.focus();
                        ta.select();
                        const ok = document.execCommand('copy');
                        document.body.removeChild(ta);
                        return ok;
                    } catch (_) {
                        return false;
                    }
                }
            };

            // Append a copy button to a message header. It copies the ORIGINAL
            // text (sourceEl._rawText), not the rendered/markdown-formatted HTML.
            const addCopyButton = (headerDiv, sourceEl, colorClass) => {
                if (!headerDiv || !sourceEl) return;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `copy-btn ml-2 align-middle opacity-50 hover:opacity-100 transition-opacity ${colorClass}`;
                btn.title = 'Copy original text';
                btn.innerHTML = CLIPBOARD_ICON_SVG;
                btn.addEventListener('click', async () => {
                    const text = (sourceEl._rawText != null) ? sourceEl._rawText : sourceEl.textContent;
                    const ok = await copyToClipboard(text || '');
                    showToast(ok ? 'Copied to clipboard.' : 'Copy failed.', !ok);
                });
                headerDiv.appendChild(btn);
            };

            // Human-readable byte size (e.g. 920 B, 4.3 KB, 1.2 MB).
            const formatBytes = (n) => {
                if (n === null || n === undefined || isNaN(n)) return '? B';
                if (n < 1024) return `${n} B`;
                if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
                return `${(n / (1024 * 1024)).toFixed(1)} MB`;
            };

            // UTF-8 byte length of a string (or JSON for non-strings).
            const byteLen = (v) => {
                if (v === null || v === undefined) return 0;
                const s = (typeof v === 'string') ? v : JSON.stringify(v);
                return new TextEncoder().encode(s).length;
            };

            // Append a "Tool" row showing only the call/response byte counts.
            // Returns the row so its response size can be filled in later.
            const addToolRow = (aiNodes, name, callBytes) => {
                if (!aiNodes || !aiNodes.toolContent) return null;
                aiNodes.toolDetails.classList.remove('hidden');
                const safeName = String(name || 'tool').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const row = document.createElement('div');
                row.className = 'tool-row mt-1';
                row.innerHTML = `<span class="text-yellow-600">[TOOL]</span> `
                    + `<span class="font-bold">${safeName}</span> `
                    + `<span class="text-yellow-700">call</span> <span class="call-bytes">${formatBytes(callBytes)}</span> `
                    + `<span class="text-yellow-700">&middot; resp</span> <span class="resp-bytes text-yellow-600">&hellip;</span>`;
                aiNodes.toolContent.appendChild(row);
                return row;
            };

            const setToolRowResponse = (row, respBytes) => {
                if (!row) return;
                const el = row.querySelector('.resp-bytes');
                if (el) {
                    el.textContent = formatBytes(respBytes);
                    el.classList.remove('text-yellow-600');
                    el.classList.add('text-yellow-400');
                }
            };

            const renderUserMessage = (text, imagesBase64 = [], files = []) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'w-full animate-fade-in mt-2';

                let imagesHtml = '';
                if (imagesBase64.length > 0) {
                    imagesHtml = '<div class="flex flex-wrap gap-4 mt-2">';
                    imagesBase64.forEach(img => {
                        imagesHtml += `<img src="${img}" alt="upload" class="max-w-[200px] max-h-[200px] border border-yellow-700 object-cover p-1 bg-black">`;
                    });
                    imagesHtml += '</div>';
                }

                let filesHtml = '';
                if (files && files.length > 0) {
                    filesHtml = '<div class="flex flex-wrap gap-2 mt-2">';
                    files.forEach(file => {
                        const safeName = (file.name || 'file').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        filesHtml += `<span class="border border-cyan-800 text-cyan-400 px-2 py-1 text-xs">[FILE] ${safeName}</span>`;
                    });
                    filesHtml += '</div>';
                }

                const escapedText = (text || '').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const formattedText = escapedText.replace(/\n/g, '<br>');

                wrapper.innerHTML = `
                    <div class="msg-header"><span class="text-green-500 font-bold">User</span></div>

                    <div class="pl-4 mt-2 border-l-2 border-green-900">
                        <div class="user-text text-gray-100">${formattedText}</div>
                        ${imagesHtml}
                        ${filesHtml}
                    </div>
                `;
                const userTextEl = wrapper.querySelector('.user-text');
                userTextEl._rawText = text || '';
                addCopyButton(wrapper.querySelector('.msg-header'), userTextEl, 'text-green-500');
                chatContainer.appendChild(wrapper);
                scrollToBottom();
            };

            const createAiMessageContainer = () => {
                const wrapper = document.createElement('div');
                wrapper.className = 'w-full animate-fade-in mt-4 mb-8';
                
                wrapper.innerHTML = `
                    <div class="thinking-details hidden mb-4">
                        <div class="thinking-header"><span class="text-violet-500 font-bold">Thinking</span></div>
                        <div class="pl-4 mt-2 border-l-2 border-violet-900">
                            <div class="thinking-content whitespace-pre-wrap text-violet-400 font-mono text-xs overflow-x-auto mt-1"></div>
                        </div>
                    </div>

                    <div class="tool-details hidden mb-4">
                        <div class="tool-header"><span class="text-yellow-500 font-bold">Tool</span></div>
                        <div class="pl-4 mt-2 border-l-2 border-yellow-900">
                            <div class="tool-content text-yellow-400 font-mono text-xs mt-1"></div>
                        </div>
                    </div>

                    <div>
                        <div class="assistant-header"><span class="text-cyan-500 font-bold">Assistant</span> <span class="text-cyan-800 animate-pulse">executing processing...</span></div>
                        <div class="pl-4 mt-2 border-l-2 border-cyan-900">
                            <div class="message-content text-container blinking-cursor text-gray-100 mt-1"></div>
                        </div>
                    </div>
                `;
                chatContainer.appendChild(wrapper);
                scrollToBottom();

                const contentEl = wrapper.querySelector('.text-container');
                const thinkingEl = wrapper.querySelector('.thinking-content');
                contentEl._rawText = '';
                thinkingEl._rawText = '';
                addCopyButton(wrapper.querySelector('.assistant-header'), contentEl, 'text-cyan-500');
                addCopyButton(wrapper.querySelector('.thinking-header'), thinkingEl, 'text-violet-500');

                return {
                    root: wrapper,
                    content: contentEl,
                    thinkingDetails: wrapper.querySelector('.thinking-details'),
                    thinkingContent: thinkingEl,
                    toolDetails: wrapper.querySelector('.tool-details'),
                    toolContent: wrapper.querySelector('.tool-content'),
                    statusText: wrapper.querySelector('.animate-pulse')
                };
            };

            // Message content from the API may be a plain string or a list of
            // content parts ({type:"text"|"image_url", ...}). Normalize both.
            // `skipParts` (a Set of indices) excludes file-attachment parts that
            // the attachments metadata accounts for.
            const extractText = (content, skipParts) => {
                if (!content) return '';
                if (typeof content === 'string') return content;
                if (Array.isArray(content)) {
                    return content
                        .filter((part, i) => part && part.type === 'text'
                            && !(skipParts && skipParts.has(i)))
                        .map(part => part.text || '')
                        .join('\n');
                }
                return String(content);
            };

            const extractImages = (content, fallback = []) => {
                if (Array.isArray(content)) {
                    const imgs = content
                        .filter(part => part && part.type === 'image_url' && part.image_url)
                        .map(part => part.image_url.url)
                        .filter(Boolean);
                    if (imgs.length > 0) return imgs;
                }
                return fallback || [];
            };

            const formatBasicMarkdown = (text) => {
                if (!text) return '';
                let formatted = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
                formatted = formatted.replace(/`([^`]+)`/g, '<code class="text-yellow-400">$1</code>');
                formatted = formatted.replace(/\*\*([^\*]+)\*\*/g, '<strong class="text-white">$1</strong>');
                formatted = formatted.replace(/\*([^\*]+)\*/g, '<em class="text-gray-300">$1</em>');
                formatted = formatted.replace(/\n/g, '<br>');
                return formatted;
            };

            uploadBtn.addEventListener('click', () => fileUpload.click());

            fileUpload.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                files.forEach(file => {
                    if (!file.type.startsWith('image/')) {
                        showToast(`File ${file.name} is not an image.`);
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        selectedImages.push({ name: file.name, data: event.target.result });
                        updateImagePreview();
                    };
                    reader.readAsDataURL(file);
                });
                fileUpload.value = ''; 
            });

            const updateImagePreview = () => {
                if (selectedImages.length > 0) {
                    imagePreviewContainer.classList.remove('hidden');
                    imagePreviewContainer.innerHTML = '';
                    
                    selectedImages.forEach((img, index) => {
                        const previewDiv = document.createElement('div');
                        previewDiv.className = 'image-preview-wrapper';
                        previewDiv.innerHTML = `
                            <img src="${img.data}" alt="preview" class="h-16 w-16 object-cover border border-yellow-600">
                            <div class="remove-image-btn" data-index="${index}">[X]</div>
                        `;
                        imagePreviewContainer.appendChild(previewDiv);
                    });

                    document.querySelectorAll('.remove-image-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const idx = parseInt(this.getAttribute('data-index'));
                            selectedImages.splice(idx, 1);
                            updateImagePreview();
                        });
                    });
                } else {
                    imagePreviewContainer.classList.add('hidden');
                    imagePreviewContainer.innerHTML = '';
                }
            };

            // ---- Text file attachments ----------------------------------------
            fileBtn.addEventListener('click', () => textFileUpload.click());

            // Guard against pathologically large text files (5 MB).
            const MAX_TEXT_FILE_BYTES = 5 * 1024 * 1024;

            textFileUpload.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                files.forEach(file => {
                    if (file.size > MAX_TEXT_FILE_BYTES) {
                        showToast(`File ${file.name} is too large (max 5 MB).`);
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        // Read as a base64 data URL so it maps to the OpenAI
                        // file content part's `file_data` field. Browsers leave
                        // the mime blank for unknown types, so default to text.
                        let dataUrl = event.target.result;
                        if (dataUrl.startsWith('data:;base64,')) {
                            dataUrl = 'data:text/plain;base64,' + dataUrl.slice('data:;base64,'.length);
                        }
                        selectedFiles.push({ name: file.name, size: file.size, fileData: dataUrl });
                        updateFilePreview();
                    };
                    reader.onerror = () => showToast(`Failed to read ${file.name}.`);
                    reader.readAsDataURL(file);
                });
                textFileUpload.value = '';
            });

            const updateFilePreview = () => {
                if (selectedFiles.length > 0) {
                    filePreviewContainer.classList.remove('hidden');
                    filePreviewContainer.innerHTML = '';

                    selectedFiles.forEach((file, index) => {
                        const chip = document.createElement('div');
                        chip.className = 'flex items-center gap-2 border border-cyan-800 text-cyan-400 px-2 py-1 text-xs';
                        const safeName = file.name.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        chip.innerHTML = `
                            <span class="text-cyan-600">[FILE]</span>
                            <span>${safeName}</span>
                            <span class="text-cyan-800">${file.size}b</span>
                            <button type="button" class="remove-file-btn text-red-500 hover:text-white" data-index="${index}">[X]</button>
                        `;
                        filePreviewContainer.appendChild(chip);
                    });

                    document.querySelectorAll('.remove-file-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const idx = parseInt(this.getAttribute('data-index'));
                            selectedFiles.splice(idx, 1);
                            updateFilePreview();
                        });
                    });
                } else {
                    filePreviewContainer.classList.add('hidden');
                    filePreviewContainer.innerHTML = '';
                }
            };

            const fetchHistory = async (showSuccess = false) => {
                try {
                    const response = await fetch(`${getBaseUrl()}/history`, { method: 'GET', mode: 'cors' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    chatContainer.innerHTML = '';

                    // The API returns { messages: [...] }; older shapes returned a
                    // bare array. Support both, and skip system messages.
                    const rawMessages = Array.isArray(data) ? data : (data.messages || []);
                    const history = rawMessages.filter(msg => msg.role !== 'system');

                    if (history.length > 0) {
                         // Tool results arrive as separate role:"tool" messages;
                         // map call id -> its row so we can fill in response bytes.
                         const toolRowsById = {};
                         history.forEach(msg => {
                             if (msg.role === 'user') {
                                 // File chips and which content parts to hide come
                                 // from the structured attachments metadata.
                                 const atts = Array.isArray(msg.attachments) ? msg.attachments : [];
                                 const fileAtts = atts.filter(a => a.kind !== 'image');
                                 const skip = new Set(fileAtts.map(a => a.part));
                                 const text = extractText(msg.content || msg.prompt, skip);
                                 const files = fileAtts.map(a => ({ name: a.name }));
                                 renderUserMessage(text, extractImages(msg.content, msg.images), files);
                             } else if (msg.role === 'assistant' || msg.role === 'model') {
                                 const aiNodes = createAiMessageContainer();
                                 aiNodes.statusText.classList.add('hidden');
                                 aiNodes.content.classList.remove('blinking-cursor');

                                 if (msg.thinking) {
                                     aiNodes.thinkingDetails.classList.remove('hidden');
                                     aiNodes.thinkingContent.innerHTML = formatBasicMarkdown(msg.thinking);
                                     aiNodes.thinkingContent._rawText = msg.thinking;
                                 }
                                 const assistantText = extractText(msg.content);
                                 aiNodes.content.innerHTML = formatBasicMarkdown(assistantText);
                                 aiNodes.content._rawText = assistantText;

                                 (msg.tool_calls || []).forEach(tc => {
                                     const fn = tc.function || {};
                                     const row = addToolRow(aiNodes, fn.name, byteLen(fn.arguments));
                                     if (tc.id) toolRowsById[tc.id] = row;
                                 });
                             } else if (msg.role === 'tool') {
                                 setToolRowResponse(toolRowsById[msg.tool_call_id], byteLen(msg.content));
                             }
                         });
                    }

                    setOnline(true);
                    if (showSuccess) showToast(`Connection OK to ${getBaseUrl()}`, false);
                    return true;
                } catch (error) {
                    console.error("History fetch error:", error);
                    setOnline(false);
                    if (showSuccess) showToast(`Connection Failed: ${error.message}`);
                    return false;
                }
            };

            // Fetch the app name + version from the server and show it in the header.
            const fetchVersion = async () => {
                try {
                    const response = await fetch(`${getBaseUrl()}/version`, { method: 'GET', mode: 'cors' });
                    if (!response.ok) return;
                    const data = await response.json();
                    const title = data.title || `${data.name || 'AI-Agent.Alexis'} v${data.version || '0.0.0'}`;
                    appTitle.textContent = title;
                    document.title = title;
                } catch (error) {
                    console.error("Version fetch error:", error);
                }
            };

            // Ask the server which modalities the model supports and reflect it
            // on the [IMG] button: dark red + disabled when vision is missing.
            const fetchCapabilities = async () => {
                try {
                    const response = await fetch(`${getBaseUrl()}/capabilities`, { method: 'GET', mode: 'cors' });
                    if (!response.ok) return;
                    const caps = await response.json();
                    if (caps.vision === false) {
                        imageSupported = false;
                        uploadBtn.disabled = true;
                        uploadBtn.title = 'Image input not supported by this model'
                            + (caps.model ? ` (${caps.model})` : '');
                        uploadBtn.classList.remove('text-yellow-500', 'hover:bg-yellow-900', 'hover:text-white');
                        uploadBtn.classList.add('text-red-900', 'cursor-not-allowed');
                    } else if (caps.vision === true) {
                        imageSupported = true;
                        uploadBtn.disabled = isGenerating;
                        uploadBtn.title = 'Attach Images';
                        uploadBtn.classList.remove('text-red-900', 'cursor-not-allowed');
                        uploadBtn.classList.add('text-yellow-500', 'hover:bg-yellow-900', 'hover:text-white');
                    }
                } catch (error) {
                    console.error("Capabilities fetch error:", error);
                }
            };

            clearBtn.addEventListener('click', async () => {
                if(confirm("Execute clear_history.sh?")) {
                    try {
                        const response = await fetch(`${getBaseUrl()}/clear`, { method: 'POST', mode: 'cors' });
                        if (response.ok) {
                            chatContainer.innerHTML = '';
                            showToast("History purged.", false);
                        } else {
                            throw new Error('Server error');
                        }
                    } catch (error) {
                        showToast("Failed to purge server logs.");
                        chatContainer.innerHTML = '';
                        renderGreeting();
                    }
                }
            });

            // Segmented digital activity loader component. Builds N "LED" cells
            // and, while running, steps a single lit cell left->right->left in a
            // loop (a digital scanner). Idle = all cells unlit.
            const procLoaderCtl = (() => {
                let segs = [];
                let timer = null;
                let pos = 0;
                let dir = 1;
                const STEP_MS = 110;
                const clearLit = () => segs.forEach(s => s.classList.remove('lit'));
                const build = (el, count = 7) => {
                    if (!el) return;
                    el.innerHTML = '';
                    segs = [];
                    for (let i = 0; i < count; i++) {
                        const s = document.createElement('div');
                        s.className = 'proc-seg';
                        el.appendChild(s);
                        segs.push(s);
                    }
                };
                const start = () => {
                    if (timer || segs.length === 0) return;
                    pos = 0;
                    dir = 1;
                    const tick = () => {
                        clearLit();
                        segs[pos].classList.add('lit');
                        // Bounce off the ends so it sweeps both directions.
                        if (pos === segs.length - 1) dir = -1;
                        else if (pos === 0) dir = 1;
                        pos += dir;
                    };
                    tick();
                    timer = setInterval(tick, STEP_MS);
                };
                const stop = () => {
                    if (timer) { clearInterval(timer); timer = null; }
                    clearLit();
                };
                return { build, start, stop };
            })();
            procLoaderCtl.build(procLoader, 7);

            const setGeneratingState = (generating) => {
                isGenerating = generating;
                procLoader.classList.toggle('active', generating);
                procLoader.title = generating ? 'Processing...' : 'Idle';
                if (generating) procLoaderCtl.start();
                else procLoaderCtl.stop();
                if (generating) {
                    sendBtn.classList.add('hidden');
                    stopBtn.classList.remove('hidden');
                    messageInput.disabled = true;
                    uploadBtn.disabled = true;
                    fileBtn.disabled = true;
                } else {
                    sendBtn.classList.remove('hidden');
                    stopBtn.classList.add('hidden');
                    messageInput.disabled = false;
                    uploadBtn.disabled = !imageSupported;
                    fileBtn.disabled = false;
                    messageInput.focus();
                }
            };

            stopBtn.addEventListener('click', () => {
                if (currentAbortController) {
                    currentAbortController.abort();
                    currentAbortController = null;
                }
                setGeneratingState(false);
            });

            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const text = messageInput.value.trim();
                const imagesToSubmit = [...selectedImages];
                const filesToSubmit = [...selectedFiles];

                if (!text && imagesToSubmit.length === 0 && filesToSubmit.length === 0) return;

                renderUserMessage(text, imagesToSubmit.map(img => img.data), filesToSubmit);

                messageInput.value = '';
                resizeTextarea();
                selectedImages = [];
                updateImagePreview();
                selectedFiles = [];
                updateFilePreview();

                const aiNodes = createAiMessageContainer();
                setGeneratingState(true);

                const payload = {
                    prompt: text,
                    images: imagesToSubmit.map(img => img.data),
                    files: filesToSubmit.map(f => ({ filename: f.name, file_data: f.fileData }))
                };

                currentAbortController = new AbortController();

                try {
                    const response = await fetch(`${getBaseUrl()}/chat`, {
                        method: 'POST',
                        mode: 'cors',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'text/event-stream' 
                        },
                        body: JSON.stringify(payload),
                        signal: currentAbortController.signal
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    aiNodes.statusText.classList.add('hidden');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let fullContentResponse = "";
                    let fullThinkingResponse = "";
                    let buffer = "";
                    let pendingToolRow = null;  // tool_call row awaiting its result

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        // The final element is an incomplete line (or "" when the
                        // chunk ended on a newline). Keep it buffered until the
                        // rest arrives so large frames (e.g. tool_call_building
                        // with big payloads) are never JSON.parsed half-formed.
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const dataStr = line.substring(6).trim();

                                if (dataStr === '[DONE]') continue;

                                try {
                                    const dataObj = JSON.parse(dataStr);
                                    
                                    if (dataObj.type === 'thinking') {
                                        aiNodes.thinkingDetails.classList.remove('hidden');
                                        aiNodes.thinkingDetails.open = true; 
                                        
                                        fullThinkingResponse += (dataObj.data || "");
                                        aiNodes.thinkingContent.innerHTML = formatBasicMarkdown(fullThinkingResponse);
                                        aiNodes.thinkingContent._rawText = fullThinkingResponse;
                                        
                                        if (!fullContentResponse) {
                                            aiNodes.content.classList.remove('blinking-cursor');
                                            aiNodes.thinkingContent.classList.add('blinking-cursor');
                                        }
                                        
                                    } else if (dataObj.type === 'content') {
                                        aiNodes.thinkingContent.classList.remove('blinking-cursor');
                                        aiNodes.content.classList.add('blinking-cursor');

                                        fullContentResponse += (dataObj.data || "");
                                        aiNodes.content.innerHTML = formatBasicMarkdown(fullContentResponse);
                                        aiNodes.content._rawText = fullContentResponse;
                                    } else if (dataObj.type === 'tool_call') {
                                        // Tool activity lives in its own section; show
                                        // only the call's byte size, not its payload.
                                        pendingToolRow = addToolRow(aiNodes, dataObj.name, dataObj.bytes);
                                    } else if (dataObj.type === 'tool_result') {
                                        setToolRowResponse(pendingToolRow, dataObj.bytes);
                                        pendingToolRow = null;
                                    } else if (dataObj.type === 'tool_call_building' || dataObj.type === 'usage') {
                                        // Streamed progress/metrics: not shown in the chat.
                                    } else {
                                        const textChunk = dataObj.chunk || dataObj.content || dataObj.text || "";
                                        fullContentResponse += textChunk;
                                        aiNodes.content.innerHTML = formatBasicMarkdown(fullContentResponse);
                                        aiNodes.content._rawText = fullContentResponse;
                                    }
                                } catch (e) {
                                    // Only treat genuinely non-JSON frames as raw
                                    // content. A frame that failed to parse but
                                    // carries our envelope (e.g. a malformed/partial
                                    // "type" message) must never leak into Assistant.
                                    if (dataStr.includes('"type"')) {
                                        continue;
                                    }
                                    aiNodes.thinkingContent.classList.remove('blinking-cursor');
                                    aiNodes.content.classList.add('blinking-cursor');
                                    fullContentResponse += dataStr;
                                    aiNodes.content.innerHTML = formatBasicMarkdown(fullContentResponse);
                                    aiNodes.content._rawText = fullContentResponse;
                                }
                                scrollToBottom();
                            }
                        }
                    }

                    aiNodes.content.classList.remove('blinking-cursor');
                    aiNodes.thinkingContent.classList.remove('blinking-cursor');

                } catch (error) {
                    aiNodes.statusText.classList.add('hidden');
                    if (error.name === 'AbortError') {
                        aiNodes.content.classList.remove('blinking-cursor');
                        aiNodes.thinkingContent.classList.remove('blinking-cursor');
                        aiNodes.content.innerHTML += '<br><span class="text-red-500 font-bold">^C [SIGINT] Process terminated.</span>';
                    } else {
                        console.error('Streaming error:', error);
                        aiNodes.content.classList.remove('blinking-cursor');
                        aiNodes.thinkingContent.classList.remove('blinking-cursor');
                        
                        let errorMessage = error.message;
                        aiNodes.content.innerHTML += `<br><span class="text-red-500 font-bold">FATAL_ERROR: ${errorMessage}</span>`;
                        showToast("Connection Interrupted");
                    }
                } finally {
                    setGeneratingState(false);
                    currentAbortController = null;
                }
            });

            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!isGenerating) {
                        chatForm.dispatchEvent(new Event('submit'));
                    }
                }
            });

            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; }
                    to { opacity: 1; }
                }
                .animate-fade-in {
                    animation: fadeIn 0.2s ease-in forwards;
                }
            `;
            document.head.appendChild(style);

            // On load: pull the version into the header and connect immediately.
            // Falls back to a greeting if the server isn't reachable yet.
            (async () => {
                fetchVersion();
                fetchCapabilities();
                const connected = await fetchHistory(false);
                if (!connected) {
                    renderGreeting();
                }
            })();
        });
    </script>
</body>
</html>
